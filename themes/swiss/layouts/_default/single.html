{{ define "main" }}
<article>
  <header class="mb-12">
    {{ if ne .Type "page" }}
    <div class="swiss-meta mb-8">
      <div class="swiss-meta-item">
        <span class="swiss-meta-label">Section</span>
        <a class="swiss-meta-value no-underline hover:text-accent" href="/{{ .Type }}">{{ .Type }}</a>
      </div>
      <div class="swiss-meta-item">
        <span class="swiss-meta-label">Date</span>
        <time class="swiss-meta-value">{{ .Date.Format "Jan 02, 2006" }}</time>
      </div>
    </div>
    {{ end }}

    <h1 class="text-4xl sm:text-5xl font-bold tracking-tight leading-none max-w-3xl" style="color: var(--color-text);">{{ .Title }}</h1>

    {{ if .Params.Lastmod }}
    <p class="text-xs uppercase tracking-wide mt-6" style="color: var(--color-muted);">Last updated: {{ .Params.Lastmod.Format "Jan 02, 2006" }}</p>
    {{ end }}
  </header>

  <div class="prose prose-lg max-w-none mb-20" style="color: var(--color-text);">
    {{ .Content }}
  </div>

  <footer class="text-right">
    <p class="text-xs uppercase tracking-wide" style="color: var(--color-muted);">{{ .WordCount }} words</p>
  </footer>
</article>
{{ end }}
