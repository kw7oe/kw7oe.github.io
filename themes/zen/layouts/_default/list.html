{{ define "main" }}
<header class="mb-16">
  <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight mb-2" style="color: var(--color-text);">{{ title .Title }}</h1>
  <p class="text-xs uppercase tracking-widest" style="color: var(--color-muted);">{{ len .Pages }} entries</p>
</header>

{{ if .Content }}
<div class="prose max-w-2xl mb-12" style="color: var(--color-text);">
  {{ .Content }}
</div>
<hr class="mb-12" style="border-color: var(--color-border);" />
{{ end }}

{{ range .Data.Pages.GroupByDate "2006" }}
<section class="mb-16">
  <h2 class="text-xs font-bold uppercase tracking-widest mb-6 pb-2 border-b" style="color: var(--color-muted); border-color: var(--color-border);">{{ .Key }}</h2>
  <ul class="space-y-0">
    {{ range .Pages }}
      {{ partial "li.html" . }}
    {{ end }}
  </ul>
  <p class="text-xs uppercase tracking-wide mt-4" style="color: var(--color-muted);">{{ len .Pages }} entries in {{ .Key }}</p>
</section>
{{ end }}
{{ end }}
