{{ define "main" }}
<article>
  <header class="mb-16">
    {{ if ne .Type "page" }}
    <div class="text-xs font-semibold uppercase tracking-widest mb-8" style="color: var(--color-muted);">
      <a class="no-underline hover:text-accent" href="/{{ .Type }}" style="color: var(--color-muted);">{{ .Type }}</a>
      <span class="mx-3" style="color: var(--color-border);">—</span>
      <time>{{ .Date.Format "Jan 02, 2006" }}</time>
    </div>
    {{ end }}

    <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight leading-none max-w-3xl" style="color: var(--color-text);">{{ .Title }}</h1>

    {{ if .Params.Lastmod }}
    <p class="text-xs uppercase tracking-wide mt-6" style="color: var(--color-muted);">Last updated: {{ .Params.Lastmod.Format "Jan 02, 2006" }}</p>
    {{ end }}
  </header>

  <div class="prose prose-lg max-w-none mb-20" style="color: var(--color-text);">
    {{ .Content }}
  </div>

  <footer class="text-right">
    <p class="text-xs uppercase tracking-wide" style="color: var(--color-muted);">{{ .WordCount }} words</p>
  </footer>
</article>
{{ end }}
